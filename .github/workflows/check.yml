name: JD Sports Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz pliki
        uses: actions/checkout@v4

      - name: Ustaw Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instaluj wymagania
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Sprawdź produkt
        run: python monitor.py
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Zapisz stan
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update size state"
          git push
